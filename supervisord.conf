[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log

[program:fastapi]
command=uvicorn api:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/fastapi.log
stderr_logfile=/var/log/supervisor/fastapi_err.log

[program:streamlit]
command=streamlit run app.py --server.port=7860 --server.address=0.0.0.0
directory=/app
autostart=true
autorestart=true
startretries=3
stdout_logfile=/var/log/supervisor/streamlit.log
stderr_logfile=/var/log/supervisor/streamlit_err.log